# SPDX-License-Identifier: Apache-2.0
# "Cook the books, get caught" — tax audit sim on NANDA Town.
#
# Two businesses cheat the IRS the same way: the one with anchored capsule books
# (biz_capsule) gets caught every time; the one with mutable books (biz_control)
# gets away with it. Over time, biz_capsule learns cheating is unprofitable.
#
# Registration: tax_audit_factory must be registered before running:
#   from nest_core.scenarios import register_scenario
#   from nanda_tax_audit.scenario import tax_audit_factory
#   register_scenario("tax_audit", tax_audit_factory)
#
# After `nest run` (or demo.py), verify the capsule ledger:
#   agent-action-capsule verify --store tax_audit_capsule_ledger.jsonl
#   agent-action-capsule verify --store tax_audit_auditor_reasoning.jsonl
name: tax_audit
description: "Cook the books, get caught: biz_control (mutable) vs biz_capsule (anchored)"

tier: 1
seed: 42

agents:
  count: 3
  brain: state-machine
  roles:
    - name: biz_control
      count: 1
    - name: biz_capsule
      count: 1
    - name: auditor
      count: 1

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: tax_audit
  config:
    cheat_start: 1.0
    anchor: false

failures:
  message_drop: 0.0

duration: "ticks: 20000"

output:
  trace: ./traces/tax_audit.jsonl
