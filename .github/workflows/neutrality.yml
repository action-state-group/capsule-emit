# SPDX-License-Identifier: Apache-2.0
# Neutrality gate — pre-merge check that this public repo carries none of the
# reserved vocabulary. The reserved-term list is NOT in this repository (a public
# gate listing the terms would itself disclose them); it is supplied at run time
# via the NEUTRALITY_TERMS repository secret. .github/neutrality_scan.py is pure
# matching logic parameterized by that secret, and is fail-closed: a missing
# secret fails the job rather than passing silently.
#
# To make this a required pre-merge gate, enable branch protection on `main` and
# require the "neutrality" status check (repo Settings → Branches).
# Note: GitHub withholds secrets from FORK pull requests by design; this gate is
# effective for same-repo (maintainer) PRs. Outside-fork enforcement, if ever
# needed, requires a different mechanism (e.g. a private check-run app).
name: neutrality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  neutrality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reserved-vocabulary neutrality scan (term list from secret)
        env:
          NEUTRALITY_TERMS: ${{ secrets.NEUTRALITY_TERMS }}
        run: python .github/neutrality_scan.py .
